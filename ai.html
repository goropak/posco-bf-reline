<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>고로개수TF - AI Agent</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
.ai-hero{text-align:center;padding:60px 24px 40px;position:relative;z-index:1}
.ai-hero .badge{display:inline-block;font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;background:rgba(124,58,237,.08);color:#7c3aed;margin-bottom:16px}
.ai-hero h1{font-size:28px;font-weight:900;color:#1a1a2e;margin-bottom:8px;line-height:1.4}
.ai-hero p{font-size:13px;color:#888;line-height:1.7}
.s-section{margin-bottom:48px}
.s-head{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.s-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.s-title{font-size:16px;font-weight:800;color:#1a1a2e}
.s-desc{font-size:11px;color:#aaa;font-weight:500;margin-left:4px}
.s-line{flex:1;height:1px;background:rgba(0,0,0,.06);margin-left:12px}
.ai-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.ai-card{background:#fff;border-radius:18px;padding:28px 24px;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04);transition:all .25s;position:relative;overflow:hidden}
.ai-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.07)}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.ai-card.st-run::before{background:linear-gradient(90deg,#059669,#10b981)}
.ai-card.st-dev::before{background:linear-gradient(90deg,#2563eb,#60a5fa)}
.ai-card.st-plan::before{background:linear-gradient(90deg,#9ca3af,#d1d5db)}
.ai-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ai-card-icon{font-size:28px}
.ai-status{font-size:10px;font-weight:700;padding:4px 12px;border-radius:8px}
.ai-status.run{background:rgba(16,185,129,.08);color:#059669}
.ai-status.dev{background:rgba(37,99,235,.08);color:#2563eb}
.ai-status.plan{background:rgba(156,163,175,.08);color:#6b7280}
.ai-card-title{font-size:16px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.ai-card-summary{font-size:12px;color:#888;margin-bottom:12px;line-height:1.6}
.ai-card-detail{font-size:11px;color:#aaa;line-height:1.6;padding-top:12px;border-top:1px solid rgba(0,0,0,.04)}
.ai-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px}
.ai-stat{background:#fff;border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.04)}
.ai-stat-num{font-size:32px;font-weight:900;margin-bottom:4px}
.ai-stat-num.green{color:#059669}
.ai-stat-num.blue{color:#2563eb}
.ai-stat-num.gray{color:#9ca3af}
.ai-stat-label{font-size:11px;color:#999;font-weight:600}
@media(max-width:700px){.ai-grid{grid-template-columns:1fr}.ai-overview{grid-template-columns:1fr}.ai-hero h1{font-size:22px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo-area"><div class="logo-mark">TF</div><div class="logo-text">고로개수TF <span>Gwangyang BF#2 · 2025–2026</span></div></div>
  <nav>
    <a href="dashboard.html">대시보드</a><a href="team.html">조직소개</a><a href="invest.html">사업개요</a>
    <a href="safety.html">안전관리</a><a href="ai.html" class="active">AI Agent</a><a href="links.html">링크자료</a>
  </nav>
  <div style="display:flex;align-items:center;gap:12px;">
    <a href="admin.html" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:12px;padding:6px 14px;border-radius:8px;text-decoration:none;transition:all .2s;" onmouseover="this.style.color='#a78bfa';this.style.borderColor='rgba(123,104,238,0.4)'" onmouseout="this.style.color='rgba(255,255,255,0.4)';this.style.borderColor='rgba(255,255,255,0.1)'"></a>
    <button onclick="doLogout()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:12px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;" onmouseover="this.style.color='#fff';this.style.borderColor='rgba(239,68,68,0.4)'" onmouseout="this.style.color='rgba(255,255,255,0.4)';this.style.borderColor='rgba(255,255,255,0.1)'"></button>
  </div>
</div>

<div style="max-width:960px;margin:0 auto;padding:0 24px 80px;">
  <div class="ai-hero">
    <div class="badge">고로개수TF · AI 추진 과제</div>
    <h1>AI Agent</h1>
    <p>고로 개수 사업의 안전·품질·효율을 높이기 위한<br>AI 기반 과제를 추진하고 있습니다</p>
  </div>

  <div class="ai-overview" id="aiOverview"></div>

  <div class="s-section">
    <div class="s-head">
      <div class="s-dot" style="background:#7c3aed"></div>
      <div class="s-title">추진 과제</div>
      <div class="s-desc">AI Projects</div>
      <div class="s-line"></div>
    </div>
    <div class="ai-grid" id="aiGrid"></div>
  </div>
</div>

<div class="footer">© 2026 고로개수TF · POSCO Gwangyang Steelworks · Blast Furnace #2 Partial Reline</div>

<script src="js/auth.js"></script>
<script>
checkAuth();
var icons=['🧠','👁️','📝','📦','🔬','⚡'];
var statusMap={'운영중':{cls:'run',card:'st-run'},'개발중':{cls:'dev',card:'st-dev'},'기획중':{cls:'plan',card:'st-plan'}};

fetch('data/site-data.json?t='+Date.now()).then(function(r){return r.json();}).then(function(d){
  var agents=d.aiAgents||[];
  var run=0,dev=0,plan=0;
  agents.forEach(function(a){if(a.status==='운영중')run++;else if(a.status==='개발중')dev++;else plan++;});

  document.getElementById('aiOverview').innerHTML=
    '<div class="ai-stat"><div class="ai-stat-num green">'+run+'</div><div class="ai-stat-label">운영중</div></div>'+
    '<div class="ai-stat"><div class="ai-stat-num blue">'+dev+'</div><div class="ai-stat-label">개발중</div></div>'+
    '<div class="ai-stat"><div class="ai-stat-num gray">'+plan+'</div><div class="ai-stat-label">기획중</div></div>';

  var html='';
  agents.forEach(function(a,i){
    var s=statusMap[a.status]||statusMap['기획중'];
    html+='<div class="ai-card '+s.card+'">'
      +'<div class="ai-card-head"><div class="ai-card-icon">'+(icons[i]||'🤖')+'</div><div class="ai-status '+s.cls+'">'+a.status+'</div></div>'
      +'<div class="ai-card-title">'+a.name+'</div>'
      +'<div class="ai-card-summary">'+a.summary+'</div>'
      +'<div class="ai-card-detail">'+a.detail+'</div>'
      +'</div>';
  });
  document.getElementById('aiGrid').innerHTML=html;
});

(function(){
  setTimeout(function(){
    var els=document.querySelectorAll('.ai-card,.ai-stat');
    if(!('IntersectionObserver' in window))return;
    var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';obs.unobserve(e.target);}});},{threshold:0.1});
    els.forEach(function(el){el.style.opacity='0';el.style.transform='translateY(20px)';el.style.transition='opacity .5s ease, transform .5s ease';obs.observe(el);});
  },300);
})();
</script>
</body>
</html>
