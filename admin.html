<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>고로개수TF - 관리자</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin-wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px 80px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.admin-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.admin-back{color:rgba(255,255,255,.4);font-size:13px;text-decoration:none;padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;transition:all .2s}
.admin-back:hover{color:#fff;border-color:rgba(123,104,238,.4)}
.section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;color:#a78bfa;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:6px;font-weight:600}
.field input,.field textarea,.field select{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border .3s}
.field input:focus,.field textarea:focus{border-color:rgba(123,104,238,.4)}
.field textarea{resize:vertical;min-height:60px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ms-row{display:grid;grid-template-columns:2fr 1.5fr 1.5fr 1fr;gap:10px;align-items:end;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.issue-block{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:16px;margin-bottom:12px}
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn-save{padding:14px 32px;background:linear-gradient(135deg,#7b68ee,#06b6d4);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(123,104,238,.3)}
.btn-copy{padding:14px 32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-copy:hover{border-color:rgba(123,104,238,.4)}
.btn-add{padding:8px 16px;background:rgba(123,104,238,.1);border:1px solid rgba(123,104,238,.2);border-radius:8px;color:#a78bfa;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-add:hover{background:rgba(123,104,238,.2)}
.btn-del{padding:6px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#fca5a5;font-size:11px;cursor:pointer;font-family:inherit}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;display:none;animation:toastIn .3s ease}
.toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.token-section{margin-bottom:20px}
.token-input{display:flex;gap:10px}
.token-input input{flex:1}
.token-input button{padding:10px 20px;background:rgba(123,104,238,.15);border:1px solid rgba(123,104,238,.3);border-radius:10px;color:#a78bfa;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="admin-wrap">
<div class="admin-header">
  <div class="admin-title">⚙️ 관리자 페이지</div>
  <a href="dashboard.html" class="admin-back">← 대시보드로 돌아가기</a>
</div>

<!-- 토큰 설정 -->
<div class="section token-section">
  <div class="section-title">🔑 GitHub 토큰 (최초 1회 설정)</div>
  <div class="token-input">
    <input type="password" id="ghToken" placeholder="ghp_xxxx... 토큰 붙여넣기">
    <button onclick="saveToken()">저장</button>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:8px" id="tokenStatus">토큰이 설정되지 않았습니다</div>
</div>

<!-- 프로젝트 KPI -->
<div class="section">
  <div class="section-title">📊 프로젝트 KPI</div>
  <div class="row3">
    <div class="field"><label>공정률 (%)</label><input type="number" id="progress"></div>
    <div class="field"><label>총 예산 (억원)</label><input type="number" id="budgetTotal"></div>
    <div class="field"><label>집행 예산 (억원)</label><input type="number" id="budgetSpent"></div>
  </div>
  <div class="row3">
    <div class="field"><label>무재해 일수</label><input type="number" id="safetyDays"></div>
    <div class="field"><label>핵심 이슈 건수</label><input type="number" id="issueCount"></div>
    <div class="field"><label>목표일</label><input type="text" id="targetDate" placeholder="2026-12-31"></div>
  </div>
</div>

<!-- 마일스톤 -->
<div class="section">
  <div class="section-title">🗓️ 마일스톤 <button class="btn-add" onclick="addMilestone()" style="margin-left:auto">+ 추가</button></div>
  <div id="msContainer"></div>
</div>

<!-- 이슈 -->
<div class="section">
  <div class="section-title">⚠️ 이슈 <button class="btn-add" onclick="addIssue()" style="margin-left:auto">+ 추가</button></div>
  <div id="issueContainer"></div>
</div>

<!-- 사진 -->
<div class="section">
  <div class="section-title">📷 현장 사진 <button class="btn-add" onclick="addPhoto()" style="margin-left:auto">+ 추가</button></div>
  <div id="photoContainer"></div>
</div>

<!-- 저장 버튼 -->
<div class="btn-row">
  <button class="btn-save" onclick="saveToGitHub()">💾 GitHub에 저장 (바로 반영)</button>
  <button class="btn-copy" onclick="copyJSON()">📋 JSON 복사</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script>
checkAuth();

const REPO_OWNER = 'goropak';
const REPO_NAME = 'posco-bf-reline';
const FILE_PATH = 'data/site-data.json';
var siteData = null;

/* 토큰 관리 */
function saveToken(){
  var t=document.getElementById('ghToken').value.trim();
  if(!t){showToast('토큰을 입력하세요','error');return;}
  localStorage.setItem('gh_pat',t);
  document.getElementById('ghToken').value='';
  updateTokenStatus();
  showToast('토큰 저장 완료!','success');
}
function updateTokenStatus(){
  var t=localStorage.getItem('gh_pat');
  var el=document.getElementById('tokenStatus');
  if(t){el.textContent='✅ 토큰 설정됨 (ghp_...'+t.slice(-4)+')';el.style.color='#6ee7b7';}
  else{el.textContent='토큰이 설정되지 않았습니다';el.style.color='rgba(255,255,255,.25)';}
}

/* 데이터 로드 */
function loadData(){
  fetch('data/site-data.json?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      siteData=d;
      fillForm(d);
    })
    .catch(function(e){showToast('데이터 로드 실패: '+e,'error');});
}

function fillForm(d){
  var p=d.project||{};
  document.getElementById('progress').value=p.progress||0;
  document.getElementById('budgetTotal').value=p.budgetTotal||0;
  document.getElementById('budgetSpent').value=p.budgetSpent||0;
  document.getElementById('safetyDays').value=p.safetyDays||0;
  document.getElementById('issueCount').value=p.issueCount||0;
  document.getElementById('targetDate').value=p.targetDate||'';
  renderMilestones(d.milestones||[]);
  renderIssues(d.issues||[]);
  renderPhotos(d.photos||[]);
}

/* 마일스톤 */
function renderMilestones(list){
  var c=document.getElementById('msContainer');
  c.innerHTML='';
  list.forEach(function(m,i){
    var div=document.createElement('div');
    div.className='ms-row';
    div.innerHTML='<div class="field"><label>이름</label><input data-ms="'+i+'" data-key="name" value="'+(m.name||'')+'"></div>'
      +'<div class="field"><label>계획일</label><input data-ms="'+i+'" data-key="planDate" value="'+(m.planDate||'')+'"></div>'
      +'<div class="field"><label>실적일</label><input data-ms="'+i+'" data-key="actualDate" value="'+(m.actualDate||'')+'"></div>'
      +'<div class="field"><label>상태</label><select data-ms="'+i+'" data-key="status">'
      +'<option value="완료"'+(m.status==='완료'?' selected':'')+'>완료</option>'
      +'<option value="진행중"'+(m.status==='진행중'?' selected':'')+'>진행중</option>'
      +'<option value="예정"'+(m.status==='예정'?' selected':'')+'>예정</option>'
      +'</select><button class="btn-del" style="margin-top:6px" onclick="delMilestone('+i+')">삭제</button></div>';
    c.appendChild(div);
  });
}
function addMilestone(){
  if(!siteData.milestones) siteData.milestones=[];
  siteData.milestones.push({name:'',planDate:'',actualDate:null,status:'예정'});
  renderMilestones(siteData.milestones);
}
function delMilestone(i){
  siteData.milestones.splice(i,1);
  renderMilestones(siteData.milestones);
}

/* 이슈 */
function renderIssues(list){
  var c=document.getElementById('issueContainer');
  c.innerHTML='';
  list.forEach(function(issue,i){
    var div=document.createElement('div');
    div.className='issue-block';
    div.innerHTML='<div class="row" style="margin-bottom:10px">'
      +'<div class="field"><label>제목</label><input data-iss="'+i+'" data-key="title" value="'+(issue.title||'')+'"></div>'
      +'<div class="field"><label>등급</label><select data-iss="'+i+'" data-key="level">'
      +'<option value="red"'+(issue.level==='red'?' selected':'')+'>🔴 긴급</option>'
      +'<option value="yellow"'+(issue.level==='yellow'?' selected':'')+'>🟡 주의</option>'
      +'<option value="green"'+(issue.level==='green'?' selected':'')+'>🟢 완료</option>'
      +'</select></div></div>'
      +'<div class="field"><label>조치사항</label><textarea data-iss="'+i+'" data-key="action">'+(issue.action||'')+'</textarea></div>'
      +'<div class="row"><div class="field"><label>기한</label><input data-iss="'+i+'" data-key="dueDate" value="'+(issue.dueDate||'')+'"></div>'
      +'<div style="display:flex;align-items:end"><button class="btn-del" onclick="delIssue('+i+')">삭제</button></div></div>';
    c.appendChild(div);
  });
}
function addIssue(){
  if(!siteData.issues) siteData.issues=[];
  var newId=siteData.issues.length>0?Math.max.apply(null,siteData.issues.map(function(x){return x.id||0;}))+1:1;
  siteData.issues.push({id:newId,level:'yellow',title:'',action:'',dueDate:''});
  renderIssues(siteData.issues);
}
function delIssue(i){
  siteData.issues.splice(i,1);
  renderIssues(siteData.issues);
}

/* 사진 */
function renderPhotos(list){
  var c=document.getElementById('photoContainer');
  c.innerHTML='';
  list.forEach(function(p,i){
    var div=document.createElement('div');
    div.className='ms-row';
    div.innerHTML='<div class="field"><label>캡션</label><input data-ph="'+i+'" data-key="caption" value="'+(p.caption||'')+'"></div>'
      +'<div class="field"><label>날짜</label><input data-ph="'+i+'" data-key="date" value="'+(p.date||'')+'"></div>'
      +'<div class="field"><label>파일명</label><input data-ph="'+i+'" data-key="filename" value="'+(p.filename||'')+'"></div>'
      +'<div style="display:flex;align-items:end"><button class="btn-del" onclick="delPhoto('+i+')">삭제</button></div>';
    c.appendChild(div);
  });
}
function addPhoto(){
  if(!siteData.photos) siteData.photos=[];
  siteData.photos.push({filename:'',caption:'',date:''});
  renderPhotos(siteData.photos);
}
function delPhoto(i){
  siteData.photos.splice(i,1);
  renderPhotos(siteData.photos);
}

/* 폼에서 데이터 수집 */
function collectData(){
  siteData.meta.updatedAt=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
  siteData.project.progress=parseInt(document.getElementById('progress').value)||0;
  siteData.project.budgetTotal=parseInt(document.getElementById('budgetTotal').value)||0;
  siteData.project.budgetSpent=parseInt(document.getElementById('budgetSpent').value)||0;
  siteData.project.safetyDays=parseInt(document.getElementById('safetyDays').value)||0;
  siteData.project.issueCount=parseInt(document.getElementById('issueCount').value)||0;
  siteData.project.targetDate=document.getElementById('targetDate').value;

  document.querySelectorAll('[data-ms]').forEach(function(el){
    var i=parseInt(el.getAttribute('data-ms'));
    var k=el.getAttribute('data-key');
    if(siteData.milestones[i]) siteData.milestones[i][k]=el.value||(k==='actualDate'?null:'');
  });

  document.querySelectorAll('[data-iss]').forEach(function(el){
    var i=parseInt(el.getAttribute('data-iss'));
    var k=el.getAttribute('data-key');
    if(siteData.issues[i]) siteData.issues[i][k]=el.tagName==='TEXTAREA'?el.value:el.value;
  });

  document.querySelectorAll('[data-ph]').forEach(function(el){
    var i=parseInt(el.getAttribute('data-ph'));
    var k=el.getAttribute('data-key');
    if(siteData.photos[i]) siteData.photos[i][k]=el.value;
  });

  return siteData;
}

/* GitHub API 저장 */
function saveToGitHub(){
  var token=localStorage.getItem('gh_pat');
  if(!token){showToast('먼저 GitHub 토큰을 설정하세요','error');return;}
  var data=collectData();
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  var url='https://api.github.com/repos/'+REPO_OWNER+'/'+REPO_NAME+'/contents/'+FILE_PATH;

  fetch(url,{headers:{'Authorization':'token '+token}})
    .then(function(r){return r.json();})
    .then(function(info){
      return fetch(url,{
        method:'PUT',
        headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
        body:JSON.stringify({message:'데이터 업데이트 '+new Date().toLocaleString('ko-KR'),content:content,sha:info.sha})
      });
    })
    .then(function(r){
      if(r.ok){showToast('✅ 저장 완료! 1~2분 후 사이트에 반영됩니다','success');}
      else{r.json().then(function(e){showToast('저장 실패: '+e.message,'error');});}
    })
    .catch(function(e){showToast('오류: '+e,'error');});
}

/* JSON 클립보드 복사 */
function copyJSON(){
  var data=collectData();
  var text=JSON.stringify(data,null,2);
  navigator.clipboard.writeText(text).then(function(){
    showToast('📋 JSON 복사 완료! GitHub에 붙여넣기하세요','success');
  });
}

/* 토스트 */
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type;
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},4000);
}

/* 초기화 */
updateTokenStatus();
loadData();
</script>
</body>
</html>
